<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Change Password | SABC</title>
        <link rel="icon" type="image/png" href="image001.png"/>
        <link rel="stylesheet" href="style.css" />
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    </head>
    <body>
        <div class="page-wrapper">
            <!-- LOGO -->
            <div class="logo-bar-chpw">
                <img src="image001.png" alt="Logo Brasserie" class="logo-chpw" />
            </div>
            <div class="card-chpw">
                <!-- LEFT — illustration zone -->
                 <div class="card__left-chpw">
                    <img src="change-password.svg" alt="illustration" style="width:100%; max-width:380px;"/>
                 </div>
                <!-- RIGHT — form -->
                 <div class="card__right-chpw">
                   <div id="state-invalid" style="display:none">
                    <div class="info-box-chpw">
                         <div class="icon-wrap-chpw" style="color:#E74C3C;background:rgba(231,76,60,0.1)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                        </svg>
                         </div>
                        <p>
                        This link is <strong>invalid or expired</strong>.<br>
                        Make a new reinitialisation demande.
                        </p>
                    </div>
                    <p class="form-footer" style="text-align:center">
                     <a href="forgot-password.html" class="link-muted">← Nouvelle demande</a>
                    </p>
                   </div>

                   <div id="state-form" style="display:none">
                        <h1 class="title-chpw">New<br>Password</h1>
                        <p class="subtitle-chpw">
                        Choose a securized password (minimum 8 characters).
                        </p>

                        <div class="field-group-chpw">
                        <label for="new-password">New Password</label>
                            <div class="password-wrap-chpw">
                                <input type="password" id="new-password" placeholder="••••••••" autocomplete="new-password" />
                                <button type="button" class="toggle-pw" onclick="togglePw('new-password', this)" title="Afficher / masquer">
                                <svg id="eye-new" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                </button>
                            </div>
                            <span class="field-error" id="pw-error"></span>
                        </div>

                        <!-- Barre de force du mot de passe -->
                        <div class="pw-strength-bar" id="strength-bar" style="margin-top:-12px;margin-bottom:16px">
                            <div class="pw-strength-track">
                                <div class="pw-strength-fill" id="strength-fill"></div>
                            </div>
                            <span class="pw-strength-label" id="strength-label"></span>
                        </div>

                        <div class="field-group-chpw">
                            <label for="confirm-password">Confirmer le mot de passe</label>
                            <div class="password-wrap-chpw">
                                <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password" />
                                <button type="button" class="toggle-pw" onclick="togglePw('confirm-password', this)" title="Afficher / masquer">
                                 <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                 </svg>
                                </button>
                            </div>
                            <span class="field-error" id="confirm-error"></span>
                        </div>

                        <button class="btn-primary-chpw" id="btn-change" onclick="changePassword()">
                            <span id="btn-change-label">Changer le mot de passe</span>
                            <span id="btn-change-spinner" class="btn-spinner" style="display:none"></span>
                        </button>
                    </div>

                    <!-- ÉTAT : succès -->
                    <div id="state-success" style="display:none">
                        <div class="info-box-chpw">
                         <div class="icon-wrap-chpw" style="color:#27AE60;background:rgba(39,174,96,0.1)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                             <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                         </div>
                         <p>
                            Your Password has been <strong>Changed successfully</strong>.<br>
                            Redirection to login page in <strong id="countdown">3</strong>s…
                         </p>
                        </div>
                    </div>

                    <!-- Chargement initial (pendant la vérification du token) -->
                    <div id="state-loading" style="text-align:center;padding:60px 0">
                     <div class="btn-spinner" style="display:inline-block;width:28px;height:28px;border-width:3px"></div>
                     <p style="margin-top:16px;font-size:0.85rem;color:#8A8FA8">Vérification du lien…</p>
                    </div>

                 </div>
            </div>
            <footer class="footer">
                &copy; 2026, by Kochere Djiomegni for SABC
            </footer>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
        <script src="change-password.js"></script>
    </body>
</html>
