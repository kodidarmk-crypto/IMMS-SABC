            <div class="gmao-body">
            <!-- CARD 1 -->
            <div class="gmao-card machine-overview-card">
                <div class="machine-overview-image">
                 <img src="" alt="Machine Image" id="machineImage">
                </div>
                <div class="machine-overview-content">
                    <div class="machine-title-row">
                        <div><h1 id="machineName"></h1>
                            <p class="machine-subtitle" id="machineType"></p>
                        </div>
                        <span class="machine-status" id="machineStatus"></span>
                    </div>
                    <div class="machine-info-grid">
                        <div class="machine-info">
                            <span>Factory</span>
                            <p id="machineFactory"></p>
                        </div>
                        <div class="machine-info">
                            <span>Production Line</span>
                            <p id="machineLine"></p>
                        </div>
                        <div class="machine-info">
                            <span>Manufacturer</span>
                            <p id="machineManufacturer"></p>
                        </div>
                    </div>
                    <div class="machine-description">
                     <h3>Machine Overview</h3>
                     <p id="machineDescription"></p>
                    </div>
                </div>
            </div>
            <!-- CARD 2 -->
            <div class="gmao-card alerts-card">
                <div class="card-header">
                    <h2>Alert Pannel</h2>
                </div>
                <div class="alert-list"></div>
            </div>
            <!-- CARD 3 -->
            <div class="gmao-card interventions-card">
                <div class="card-header">
                    <h2>Weekly Interventions</h2>
                </div>
                <div class="interventions-list"></div>
            </div>
            <!-- CARD 4 -->
            <div class="gmao-card team-card">
                <div class="card-header">
                    <h2>Machine Team</h2>
                </div>
                <div class="team-list"></div>
            </div>
            <!-- CARD 5 -->
             <div class="gmao-card elements-card">
                <div class="card-header">
                    <h2>Machine Elements</h2>
                    <button type="button">Add Elements</button>
                </div>
                <div class="elements-list"></div>
            </div>
